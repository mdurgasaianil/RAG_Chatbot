<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DocMind - SSE Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #ffffff;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
        }
        input {
            width: 60%;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
        }
        button {
            background: #4f46e5;
            color: white;
            cursor: pointer;
            padding: 10px 20px;
        }
        button:hover { background: #4338ca; }
        #upload-section, #chat-section {
            margin: 20px 0;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 10px;
        }
        #answer-box {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 8px;
            border-left: 3px solid #4f46e5;
            min-height: 60px;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        #status {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }
        .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        #session-info {
            font-size: 12px;
            color: #4ade80;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h2>🧠 DocMind — SSE Streaming Test</h2>

    <!-- Upload Section -->
    <div id="upload-section">
        <div class="label">Step 1 — Upload a document</div>
        <input type="file" id="file-input" accept=".pdf,.docx,.txt"/>
        <button onclick="uploadFile()">Upload</button>
        <div id="session-info"></div>
    </div>

    <!-- Chat Section -->
    <div id="chat-section">
        <div class="label">Step 2 — Ask a question</div>
        <input 
            type="text" 
            id="question-input" 
            placeholder="Ask anything about your document..."
        />
        <button onclick="askQuestion()">Ask</button>
        <div id="answer-box">Answer will stream here...</div>
        <div id="status"></div>
    </div>

<script>
    let sessionId = null;

    // ── Upload document ──
    async function uploadFile() {
        const file = document.getElementById('file-input').files[0];
        if (!file) {
            alert('Please select a file first!');
            return;
        }

        document.getElementById('session-info').textContent = 'Uploading...';

        const formData = new FormData();
        formData.append('file', file);

        const response = await fetch('http://localhost:8000/upload', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();
        sessionId = data.session_id;

        document.getElementById('session-info').textContent = 
            `✓ Uploaded: ${data.file_name} | Chunks: ${data.total_chunks} | Session: ${sessionId}`;
    }

    // ── Ask question with SSE streaming ──
    async function askQuestion() {
        if (!sessionId) {
            alert('Please upload a document first!');
            return;
        }

        const question = document.getElementById('question-input').value;
        if (!question.trim()) {
            alert('Please enter a question!');
            return;
        }

        // Clear previous answer
        const answerBox = document.getElementById('answer-box');
        const status = document.getElementById('status');
        answerBox.textContent = '';
        status.textContent = '⏳ Thinking...';

        // Call /chat endpoint
        const response = await fetch('http://localhost:8000/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                session_id: sessionId,
                question: question
            })
        });

        // Read SSE stream
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const token = line.replace('data: ', '');
                    if (token === '[DONE]') {
                        status.textContent = '✓ Done';
                        break;
                    }
                    // Append token to answer box — this is the streaming effect!
                    answerBox.textContent += token;
                }
            }
        }
    }

    // Allow Enter key to submit question
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('question-input')
            .addEventListener('keydown', (e) => {
                if (e.key === 'Enter') askQuestion();
            });
    });
</script>

</body>
</html>
